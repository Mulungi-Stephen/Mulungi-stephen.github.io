<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merry Christmas</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { overflow: hidden; color: white; }

  /* Video Background */
  #bgVideo {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover; z-index: -3;
  }

  /* Snow Canvas */
  #snowCanvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; pointer-events: none;
  }

  /* Dark Overlay */
  .overlay {
    position: fixed; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5); z-index: -2;
  }

  /* Content */
  .content {
    height: 100vh; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
  }

  h1 {
    font-size: 4rem;
    animation: glow 2s infinite alternate;
  }

  p { margin-top: 10px; font-size: 1.5rem; }

  @keyframes glow {
    from { text-shadow: 0 0 10px red, 0 0 20px green; }
    to { text-shadow: 0 0 20px gold, 0 0 30px red; }
  }

  .controls { margin-top: 20px; }

  button {
    padding: 10px 20px; margin: 5px; border: none;
    border-radius: 8px; cursor: pointer; font-size: 1rem;
  }

  .play { background: green; color: white; }
  .pause { background: red; color: white; }
</style>
</head>
<body>

<!-- Background Video -->
<video autoplay muted loop id="bgVideo">
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="overlay"></div>
<canvas id="snowCanvas"></canvas>

<!-- Content -->
<div class="content">
  <h1>🎄 Merry Christmas 🎄</h1>
  <p>Wishing you joy, love, and happiness!</p>

  <div class="controls">
    <button class="play" onclick="playMusic()">Play Music 🎵</button>
    <button class="pause" onclick="pauseMusic()">Pause Music ⏸️</button>
  </div>
</div>

<!-- Audio -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
  const music = document.getElementById("bgMusic");
  function playMusic() { music.play(); }
  function pauseMusic() { music.pause(); }

  // Snowfall Animation
  const canvas = document.getElementById("snowCanvas");
  const ctx = canvas.getContext("2d");

  let width, height;
  let snowflakes = [];

  function resizeCanvas() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }

  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  function createSnowflakes() {
    snowflakes = [];
    for (let i = 0; i < 150; i++) {
      snowflakes.push({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 4 + 1,
        d: Math.random() * 1 + 0.5
      });
    }
  }

  function drawSnowflakes() {
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let i = 0; i < snowflakes.length; i++) {
      let f = snowflakes[i];
      ctx.moveTo(f.x, f.y);
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
    }

    ctx.fill();
    moveSnowflakes();
  }

  function moveSnowflakes() {
    for (let i = 0; i < snowflakes.length; i++) {
      let f = snowflakes[i];
      f.y += f.d;
      f.x += Math.sin(f.y * 0.01);

      if (f.y > height) {
        f.y = 0;
        f.x = Math.random() * width;
      }
    }
  }

  function updateSnow() {
    drawSnowflakes();
    requestAnimationFrame(updateSnow);
  }

  createSnowflakes();
  updateSnow();
</script>

</body>
</html>
