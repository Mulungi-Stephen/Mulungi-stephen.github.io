<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merry Christmas</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    overflow: hidden;
    color: white;
  }

  /* Video Background */
  #bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
  }

  /* Dark Overlay */
  .overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
  }

  /* Content */
  .content {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  h1 {
    font-size: 4rem;
    animation: glow 2s infinite alternate;
  }

  p {
    margin-top: 10px;
    font-size: 1.5rem;
  }

  @keyframes glow {
    from {
      text-shadow: 0 0 10px red, 0 0 20px green;
    }
    to {
      text-shadow: 0 0 20px gold, 0 0 30px red;
    }
  }

  /* Buttons */
  .controls {
    margin-top: 20px;
  }

  button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
  }

  .play { background: green; color: white; }
  .pause { background: red; color: white; }

</style>
</head>
<body>

<!-- Background Video -->
<video autoplay muted loop id="bgVideo">
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- Content -->
<div class="content">
  <h1>🎄 Merry Christmas 🎄</h1>
  <p>Mulungi Stephen<br>Wishes you joy, love, and happiness!</p>

  <div class="controls">
    <button class="play" onclick="playMusic()">Play Music 🎵</button>
    <button class="pause" onclick="pauseMusic()">Pause Music ⏸️</button>
  </div>
</div>

<!-- Audio -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
  const music = document.getElementById("bgMusic");

  function playMusic() {
    music.play();
  }

  function pauseMusic() {
    music.pause();
  }
</script>

</body>
</html>
